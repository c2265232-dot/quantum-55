<!DOCTYPE html>
<html>
<head>
  <title>Game Hub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="sidebar">
  <h2 class="logo">Game Hub</h2>

  <button onclick="filterGames('all')">All</button>
  <button onclick="showFavorites()">⭐ Favorites</button>

  <hr>

  <!-- THEMES -->
  <select onchange="setThemePreset(this.value)">
    <option value="teal">Teal</option>
    <option value="blue">Blue</option>
    <option value="purple">Purple</option>
  </select>

  <input type="color" onchange="setCustomColor(this.value)">

  <hr>

  <button onclick="exportData()">Save</button>
  <button onclick="importData()">Load</button>
</div>

<div class="main">
  <header>
    <input id="search" placeholder="Search..." oninput="searchGames()">
  </header>

  <h2>⭐ Favorites</h2>
  <div id="favorites"></div>

  <h2>🎮 Games</h2>
  <div id="games"></div>

  <h2>▶️ Continue Playing</h2>
  <div id="recent"></div>
</div>

<div id="fullscreenGame">
  <div class="controls">
    <button onclick="exitGame()">← Back</button>
    <button onclick="exitFullscreen()">Exit Fullscreen</button>
  </div>

  <iframe id="gameFrame"></iframe>
</div>
