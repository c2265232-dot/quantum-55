<!DOCTYPE html>
<html>
<head>
  <title>Game Hub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="sidebar">
  <h2 class="logo">Game Hub</h2>

  <button onclick="filterGames('all')">All</button>
  <button onclick="filterGames('action')">Action</button>
  <button onclick="filterGames('puzzle')">Puzzle</button>
  <button onclick="showFavorites()">⭐ Favorites</button>

  <hr>

  <button onclick="setPreset('google')">Google Tab</button>
  <button onclick="setPreset('classroom')">Classroom Tab</button>
</div>

<div class="main">
  <header>
    <input id="search" placeholder="Search..." oninput="searchGames()">
    <button onclick="toggleAccount()">Account</button>
  </header>

  <h2>⭐ Favorites</h2>
  <div id="favorites"></div>

  <h2>🎮 Games</h2>
  <div id="games"></div>

  <h2>▶️ Continue Playing</h2>
  <div id="recent"></div>
</div>

<!-- PLAYER -->
<div id="player" class="hidden">
  <div class="player-top">
    <button onclick="closeGame()">←</button>
    <button onclick="fullscreen()">⛶</button>
    <button onclick="openExternal()">↗</button>
  </div>
  <iframe id="gameFrame"></iframe>
</div>

<!-- ACCOUNT -->
<div id="accountBox" class="hidden">
  <input id="username" placeholder="Username">
  <button onclick="saveAccount()">Save</button>
</div>

<script src="script.js"></script>
</body>
</html>
